name: booklyapp
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  bloc: ^9.2.1
  dartz: ^0.10.1
  dio: ^5.10.0
  flutter:
    sdk: flutter
  font_awesome_flutter: ^11.0.0
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: GTSectraFine
      fonts:
        - asset: assets/fonts/GT_Sectra_Fine_Regular.ttf
      
          

